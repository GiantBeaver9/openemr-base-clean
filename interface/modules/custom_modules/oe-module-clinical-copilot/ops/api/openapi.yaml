openapi: 3.0.3
info:
  title: Clinical Co-Pilot — Week 2 Ingestion API
  version: "1.0.0"
  description: >
    Week 2 document-ingestion, verification/lock, and guideline-evidence
    endpoints of the OpenEMR Clinical Co-Pilot module. All endpoints are module
    pages under `public/`, session-authenticated (the same login cookie the rest
    of OpenEMR uses — there is no separate REST auth model), and gated by both
    the `patients/med` and `clinical_copilot/copilot_access` ACLs. State-changing
    POSTs require the `csrf_token_form` field (obtain it from an authenticated
    session). This spec is kept in sync with the implementation; the Bruno
    collection under `ops/bruno/05 - Week 2 Ingestion` exercises every operation.
servers:
  - url: https://localhost:9300
    description: Local dev stack
tags:
  - name: ingestion
  - name: review
  - name: evidence
paths:
  /interface/modules/custom_modules/oe-module-clinical-copilot/public/intake_upload.php:
    get:
      tags: [ingestion]
      summary: Intake upload form
      responses:
        "200": { description: "The intake upload form (HTML)." }
        "403": { description: "ACL denied." }
    post:
      tags: [ingestion]
      summary: Upload an intake PDF for extraction preview, or save the reviewed fields as a new patient
      description: >
        Deferred-save flow: action=upload extracts and renders the two-pane
        review screen without persisting anything; action=save (submitted from
        that review screen) creates the patient, stores the document, and
        redirects to the new chart.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [action, csrf_token_form]
              properties:
                action: { type: string, enum: [upload, save] }
                csrf_token_form: { type: string }
                document:
                  type: string
                  format: binary
                  description: >
                    Required when action=upload. PDF or image (application/pdf,
                    image/png, image/jpeg, image/webp).
                field:
                  type: object
                  additionalProperties: { type: string }
                  description: "action=save: reviewed values keyed by intake field_key."
                pdf_b64:
                  type: string
                  description: "action=save: the uploaded document, carried through the review screen as base64."
                pdf_mime:
                  type: string
                  description: "action=save: document MIME; re-validated server-side against the upload allowlist."
                pdf_name:
                  type: string
                  description: "action=save: original filename for the stored document."
      responses:
        "200": { description: "action=upload: the two-pane review screen (nothing persisted). Also the form/review re-rendered with a validation error." }
        "302": { description: "action=save success: redirect to the new patient's chart (demographics.php?set_pid=<pid>)." }
        "403": { description: "CSRF or ACL denied." }
        "413": { description: "Upload exceeded the server's post body limit." }
  /interface/modules/custom_modules/oe-module-clinical-copilot/public/lab_upload.php:
    get:
      tags: [ingestion]
      summary: Labs tab (upload or manual entry) for a patient
      parameters:
        - { name: pid, in: query, required: true, schema: { type: integer } }
      responses:
        "200": { description: "The labs upload/manual page." }
        "400": { description: "Missing pid." }
        "403": { description: "ACL denied." }
    post:
      tags: [ingestion]
      summary: Upload a lab PDF, or start a manual lab draft
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [action, pid, csrf_token_form]
              properties:
                action: { type: string, enum: [upload, manual] }
                pid: { type: integer }
                csrf_token_form: { type: string }
                document: { type: string, format: binary, description: Required when action=upload. }
      responses:
        "302": { description: "Redirect to extraction_review.php?extraction_id=<id>." }
        "200": { description: "The form re-rendered with a validation error." }
        "403": { description: "CSRF or ACL denied." }
  /interface/modules/custom_modules/oe-module-clinical-copilot/public/extraction_review.php:
    get:
      tags: [review]
      summary: The verify/edit/lock review surface for a draft extraction
      parameters:
        - { name: extraction_id, in: query, required: true, schema: { type: integer } }
        - { name: err, in: query, required: false, schema: { type: integer }, description: "Set by the Post/Redirect/Get redirect when the previous action failed." }
      responses:
        "200": { description: "The review page (fields + citations + source map)." }
        "400": { description: "Missing extraction_id." }
        "403": { description: "ACL denied." }
    post:
      tags: [review]
      summary: Edit a field, add a manual lab row, lock, or unlock
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [action, extraction_id, csrf_token_form]
              properties:
                action: { type: string, enum: [edit, add_field, lock, unlock] }
                extraction_id: { type: integer }
                csrf_token_form: { type: string }
                field_id: { type: integer, description: Required for action=edit. }
                value: { type: string, nullable: true }
                field_key: { type: string, description: Required for action=add_field (manual lab). }
                unit: { type: string, nullable: true }
                ref_range: { type: string, nullable: true }
                abnormal_flag: { type: string, nullable: true }
                collection_date:
                  type: string
                  format: date
                  description: "Used by action=lock (labs): specimen draw/collection date, strict YYYY-MM-DD; anything else falls back to today."
      responses:
        "302": { description: "Post/Redirect/Get back to the review page." }
        "400": { description: "Missing extraction_id." }
        "403": { description: "CSRF or ACL denied (unlock/post-lock edit needs an elevated admin)." }
  /interface/modules/custom_modules/oe-module-clinical-copilot/public/evidence.php:
    get:
      tags: [evidence]
      summary: Cited guideline evidence grouped by topic (hybrid RAG)
      parameters:
        - { name: pid, in: query, required: false, schema: { type: integer } }
        - name: topics
          in: query
          required: false
          description: >
            Comma-separated closed vocabulary. Omit for all topics.
          schema:
            type: string
            example: a1c,lipids
      responses:
        "200": { description: "Topic-grouped, cited guideline evidence (HTML)." }
        "403": { description: "ACL denied." }
components:
  schemas:
    SourceCitation:
      type: object
      description: The Week 2 machine-readable citation contract (per extracted fact / evidence snippet).
      required: [source_type, source_id, quote_or_value]
      properties:
        source_type: { type: string, enum: [document, guideline] }
        source_id: { type: string }
        page_or_section: { type: integer, nullable: true }
        field_or_chunk_id: { type: string, nullable: true }
        quote_or_value: { type: string }
        bbox:
          type: array
          nullable: true
          items: { type: integer }
          minItems: 4
          maxItems: 4
          description: Normalized 0–1000 [x0,y0,x1,y1].
    ExtractedField:
      type: object
      description: One field of a draft extraction (staging).
      properties:
        field_key: { type: string }
        vlm_value: { type: string, nullable: true, description: The model's original extraction. }
        value: { type: string, nullable: true, description: The human-verified value. }
        unit: { type: string, nullable: true }
        ref_range: { type: string, nullable: true }
        abnormal_flag: { type: string, nullable: true }
        edited_by_user: { type: boolean }
        citation: { $ref: "#/components/schemas/SourceCitation" }
