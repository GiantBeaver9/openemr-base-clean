# Railway build config for nashemrendo.
# https://docs.railway.com/reference/config-as-code
#
# Uses docker/railway/Dockerfile (openemr/openemr:flex + FLEX_REPOSITORY).
# First boot clones GitHub and runs composer/npm in-container — no full-repo COPY.

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/railway/Dockerfile"

